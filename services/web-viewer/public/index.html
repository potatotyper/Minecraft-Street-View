<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Minecraft Street View</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700;800&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <div class="site-shell">
    <header class="site-header">
      <a class="brand" href="/">Minecraft Street View</a>
      <nav class="site-nav" aria-label="Main navigation">
        <a href="/">Worlds</a>
      </nav>
    </header>

    <main class="home-page reveal-content" id="home-view">
      <section class="home-brief" aria-labelledby="home-title">
        <p class="eyebrow">Street View worlds</p>
        <div class="home-title-row">
          <div>
            <h1 id="home-title">Worlds with Street View on.</h1>
            <p class="brief-copy" id="home-status">Loading worlds...</p>
          </div>
          <span class="home-world-count" id="world-count">0 worlds</span>
        </div>
      </section>

      <section class="world-section" aria-label="Registered worlds">
        <div class="world-list" id="world-list"></div>
      </section>
    </main>

    <main class="viewer-page" id="viewer-view" hidden>
      <header class="viewer-topbar">
        <div class="title-wrap">
          <p class="eyebrow">Minecraft world</p>
          <h1 id="viewer-title">World</h1>
          <p id="viewer-subtitle">Loading world...</p>
        </div>
        <div class="topbar-side">
          <div class="meta" id="meta">Loading map metadata...</div>
          <div class="actions">
            <select class="dimension-select hidden" id="dimension-select" aria-label="Dimension"></select>
            <input id="snapshot-upload" type="file" multiple webkitdirectory directory hidden />
            <button class="upload-button" id="upload-button" type="button">Upload snapshots</button>
            <span class="upload-status" id="upload-status" aria-live="polite"></span>
          </div>
        </div>
      </header>

      <section class="map-panel" aria-label="Minecraft map">
        <div class="coords" id="coords">Hover map to inspect block coordinates</div>
        <div id="map"></div>
        <div class="pano-panel hidden" id="pano-panel" aria-live="polite">
          <div class="pano-toolbar">
            <div class="pano-title" id="pano-title">Street View</div>
            <button class="pano-close" id="pano-close" type="button" aria-label="Close panorama">Close</button>
          </div>
          <div class="pano-view" id="pano-view"></div>
        </div>
        <div class="error hidden" id="error"></div>
      </section>
    </main>
  </div>

  <script type="module" src="/build/app.js"></script>
</body>
</html>

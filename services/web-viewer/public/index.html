<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Minecraft Street View - Map Viewer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <div class="backdrop"></div>
  <div class="shell">
    <header class="panel topbar">
      <div class="title-wrap">
        <h1>Minecraft Map Viewer</h1>
        <p>Map-first MVP viewer for exported chunk tiles</p>
      </div>
      <div class="topbar-side">
        <div class="meta" id="meta">Loading map metadata...</div>
        <div class="actions">
          <select class="dimension-select hidden" id="dimension-select" aria-label="Dimension"></select>
          <input id="snapshot-upload" type="file" multiple webkitdirectory directory hidden />
          <button class="upload-button" id="upload-button" type="button">Upload snapshots</button>
          <span class="upload-status" id="upload-status" aria-live="polite"></span>
        </div>
      </div>
    </header>

    <main class="panel map-panel">
      <div class="coords" id="coords">Hover map to inspect block coordinates</div>
      <div id="map"></div>
      <div class="legend" id="legend">
        <strong>Controls</strong>
        <span>Scroll: zoom</span>
        <span>Drag: pan</span>
        <span>Scale: blocks</span>
      </div>
      <div class="error hidden" id="error"></div>
    </main>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
  <script type="module" src="/app.js"></script>
</body>
</html>
